<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>색 테이블 만들기</title>
    <style>
        thead {
            text-align: center;
            font-weight: bold;
        }
        td {
            min-width: 50px;
        }
        #color1
        {
            background-color: brown;
        }
        #color2
        {
            background-color: deepskyblue;
        }
        #color3
        {
            background-color: blueviolet;
        }
        #color4
        {
            background-color: gold;
        }
        #color5
        {
            background-color: darkorange;
        }
        #color6
        {
            background-color: olivedrab;
        }
    </style>
</head>
<body>
    <h3>색 이름과 코드</h3>
    <hr>
    <table border="1">
        <thead>
            <tr>
                <td>이름</td>
                <td>코드</td>
                <td>색</td>
                <td>이름</td>
                <td>코드</td>
                <td>색</td>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Brown</td>
                <td>#A52A2A</td>
                <td><div id="color1">&nbsp</div></td>
                <td>DeepSkyBlue</td>
                <td>#00BFF</td>
                <td><div id="color2">&nbsp</div></td>
            </tr>
            <tr>
                <td>BlueViolet</td>
                <td>#8A2BE2</td>
                <td><div id="color3">&nbsp</div></td>
                <td>Gold</td>
                <td>#FFD700</td>
                <td><div id="color4">&nbsp</div></td>
            </tr>
            <tr>
                <td>DarkOrange</td>
                <td>#FF8C00</td>
                <td><div id="color5">&nbsp</div></td>
                <td>OliveDrab</td>
                <td>#6B8E23</td>
                <td><div id="color6">&nbsp</div></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
