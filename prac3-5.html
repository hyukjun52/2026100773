<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>도형 서식 폼 만들기</title>
</head>
<body>
    <h3>도형 서식 폼 만들기</h3>
    <hr>
    도형 서식 입력<br>
    선종류 <select name="line" size="3">
            <option value="1">선없음</option>
            <option value="2">실선</option>
            <option value="3">점선</option>
        </select><br>
    선두께 <input type="text" size="8">
    선색 <input type="color" value="skyblue"><br>
    투명도 <input type="range" value="50" list="transparency">
    <datalist id="transparency">
        <option value="10" label="low"></option>
        <option value="50" label="meidum"></option>
        <option value="90" label="high"></option>
    </datalist>
</body>
</html>
