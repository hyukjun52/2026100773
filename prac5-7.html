<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>animation</title>
    <style>
        img {
            height: 400px;
            width: 300px;

            transition: width 2s ease-in-out;
        }
        img:hover {
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <h3>어지러워요</h3>
    <hr>
    <img src="media/spongebob.png" width="300px">
</body>
</html>
