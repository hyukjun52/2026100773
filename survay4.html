<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>설문지</title>
    <style>
        body {
            background-color: aliceblue;
            font-family: sans-serif;
            margin: 20px;
        }

        h1 {
            color: brown;
            text-align: center;
        }

        header {
            border-bottom: 1px solid black;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        section {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
            max-width: 600px;
            line-height: 2;
        }

        textarea {
            vertical-align: top;
            padding: 5px;
            font-family: sans-serif;
        }

        footer {
            background-color: orange;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            margin-top: 30px;
            max-width: 610px;
            border: 1px solid darkorange;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>과제 #3-자기 소개서 (CSS3 모양 꾸미기)</h1>
        <h3>설문지</h3>
        소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.
        <hr>
    </header>
    
    <section>
        학년 <label><input type="radio" name="grade" value="1">1학년</label>
            <label><input type="radio" name="grade" value="2">2학년</label>
            <label><input type="radio" name="grade" value="3">3학년</label><br><br>
        성별 <label><input type="radio" name="gender" value="1">남</label>
            <label><input type="radio" name="gender" value="2">여</label><br><br>
        관심분야 <select name="interest">
            <option value="1">웹 개발</option>
            <option value="2">앱 개발</option>
            <option value="3">게임 개발</option>
        </select><br><br>
        진로 <label><input type="checkbox">개발</label>
            <label><input type="checkbox">기획</label>
            <label><input type="checkbox">영업</label>
            <label><input type="checkbox">창업</label><br><br>
        남기고 싶은 말 <textarea placeholder="글을 남겨주세요" style="width: 30vh; height: 15vh;"></textarea><br><br>
    </section>
    
    <footer>
        Copyright 2026 by hyukjun oh
    </footer>

</body>
</html>
