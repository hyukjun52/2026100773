<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>do-while과 break;</title>
</head>
<body>
    <h3>암호를 입력하라</h3>
    <hr>
    <script>
        let pass = prompt("암호");

        do {
            let pass = prompt("암호");
            break;
        } while (pass == "you");
            document.write ("통과");
    </script>
</body>
</html>
