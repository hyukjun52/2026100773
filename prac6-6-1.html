<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>1</title>
</head>
<body>
    <script>
        function big(q,w) {
            q = parseInt(q)
            w = parseInt(w)

            if (q < w)
                return w;
            else
                return q;
        }
    </script>
    <script>
        let b = big("625", "555");
        document.write("큰 수 = " + b);
    </script>
</body>
</html>
