<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>animation</title>
    <style>
        @keyframes bob {
            from { transform: rotate(0);}
            to { transform: rotate(360deg);}
        }
        img {
            animation-name: bob;
            animation-duration: 2s;
            animation-iteration-count: infinite;
        }
    </style>
</head>
<body>
    <h3>어지러워요</h3>
    <hr>
    <img src="media/spongebob.png" width="300px">
</body>
</html>
